- name: Backend
  hosts: backend
  become: true

  vars:
    db_host: 172.31.32.106
    db_pass: ExpenseApp@1
    db_user: root

  tasks:
    - name: desable noodejs 16 module
      ansible.builtin.command: dnf module disable nodejs -y
    
    - name: enable nodejs 20 module
      ansible.builtin.command: dnf module enable nodejs:20 -y
    
    - name: installing nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present
    
    - name: Create expense user
      ansible.builtin.user:
        name: expense

    - name: creating app directory 
      ansible.builtin.file:
        path: /app
        state: directory
    
    - name: download and extract backend content 
      ansible.builtin.unarchive:
        src: https://expense-artifacts.s3.amazonaws.com/expense-backend-v2.zip
        dest: /app
        remote_src: yes

    - name: Install node.js Dependencies.
      community.general.npm:
        name: npm
        path: /app
    
    - name: copy backend service file 
      ansible.builtin.copy:
        src: backend.service
        dest: /etc/systemd/system/backend.service

    - name: Install MySQL client and PyMySQL
      ansible.builtin.dnf:
        name:
          - mysql
          - python3.11-PyMySQL
        state: present
    
    
    - name: Load Schema
      ansible.builtin.shell: mysql -h "{{ db_host }}" -u"{{ db_user }}" -p"{{ db_pass }}" < /app/schema/backend.sql
      
      # vars:
      #   db_host: 172.31.32.106
      #   db_user: root
      #   db_pass: ExpenseApp@1


    - name: Start backend service
      ansible.builtin.systemd_service:
        name: backend
        enabled: true
        state: restarted
        daemon_reload: true